name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: sudo apt-get update && sudo apt-get install -y qemu-system-arm binutils-arm-none-eabi
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run seed
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run evidence:generate
      - run: npm run smoke
      - run: npm run audit:phkd
